<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#f8f9fa,#ffe5e5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:360px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    text-align:center;
}

.logo{
    width:150px;
    margin-bottom:15px;
}

h2{
    color:#b30000;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#8a0000;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- Put your college logo in the repository as logo.png -->
    <img src="logo.png" class="logo" alt="APEC Logo">

    <h2>Welcome to APEC</h2>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Adhiparasakthi Engineering College<br>
        Melmaruvathur
    </div>

</div>

</body>
</html>
